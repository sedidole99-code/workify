<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workify</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%2303a9f4'/%3E%3Cpath d='M9 12 L13 22 L16 16 L19 22 L23 12' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="overlayRoot" class="overlay-root hidden">
  <div class="overlay-card" id="overlayCard"></div>
</div>

<header>
  <div class="logo">
    <svg class="logo-mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="16" cy="16" r="14" fill="currentColor"/>
      <path d="M9 12 L13 22 L16 16 L19 22 L23 12" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Workify</span>
  </div>
  <nav class="tabs" id="viewTabs">
    <button type="button" class="tab active" data-view="tracker">Time Tracker</button>
    <button type="button" class="tab" data-view="reports">Reports</button>
  </nav>
  <div class="file-info hidden" id="fileInfo">
    <span>Data file: <code id="fileName"></code></span>
    <button type="button" id="changeFileBtn">Change…</button>
  </div>
</header>

<main id="appRoot" class="hidden">
  <section id="trackerView">
  <form id="entryForm" class="entry-bar" autocomplete="off">
    <input type="text" name="description" placeholder="What have you worked on?" autocomplete="off" required>
    <select name="project" required></select>
    <div class="time-range">
      <input type="text" name="startTime" class="time-input" inputmode="numeric" maxlength="5" placeholder="HH:MM" pattern="^(\d{1,4}|\d{1,2}[:.\-\s]\d{1,2})$" required>
      <span>-</span>
      <input type="text" name="endTime" class="time-input" inputmode="numeric" maxlength="5" placeholder="HH:MM" pattern="^(\d{1,4}|\d{1,2}[:.\-\s]\d{1,2})$" required>
    </div>
    <div class="date-field">
      <input type="text" name="date" class="date-input" inputmode="numeric" maxlength="10" placeholder="DD/MM/YYYY" pattern="^\d{1,2}[./\-]\d{1,2}[./\-]\d{2,4}$" required>
      <button type="button" class="date-trigger" aria-label="Open calendar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
      </button>
    </div>
    <input type="text" name="duration" class="duration-input" placeholder="00:00" pattern="^(\d{1,4}|\d{1,2}[:.\-\s]\d{1,2})$" title="HH:MM, or just minutes (30, 90), or compact (130 = 1:30)">
    <button type="submit" class="primary">Add</button>
  </form>

  <div id="entriesContainer"></div>

  <footer class="pagination">
    <label>
      Items per page:
      <select id="pageSize">
        <option>10</option>
        <option>25</option>
        <option>50</option>
        <option>100</option>
        <option>200</option>
      </select>
    </label>
    <div class="page-controls">
      <button id="firstPage" type="button" title="First page">«</button>
      <button id="prevPage" type="button">‹ Prev</button>
      <span id="pageInfo">1 / 1</span>
      <button id="nextPage" type="button">Next ›</button>
      <button id="lastPage" type="button" title="Last page">»</button>
    </div>
  </footer>
  </section>

  <section id="reportsView" class="hidden">
    <div class="report-controls">
      <div class="range-picker">
        <label>
          Range:
          <select id="reportRange">
            <option value="this-week">This week</option>
            <option value="last-week">Last week</option>
            <option value="this-month" selected>This month</option>
            <option value="last-month">Last month</option>
            <option value="last-30">Last 30 days</option>
            <option value="this-year">This year</option>
            <option value="last-year">Last year</option>
            <option value="all">All time</option>
            <option value="custom">Custom range…</option>
          </select>
        </label>
        <div id="customRange" class="custom-range hidden">
          <span class="cr-label">From</span>
          <div class="date-field">
            <input type="text" id="rangeFrom" class="date-input" inputmode="numeric" maxlength="10" placeholder="DD/MM/YYYY" pattern="^\d{1,2}[./\-]\d{1,2}[./\-]\d{2,4}$">
            <button type="button" class="date-trigger" aria-label="Open calendar">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            </button>
          </div>
          <span class="cr-label">To</span>
          <div class="date-field">
            <input type="text" id="rangeTo" class="date-input" inputmode="numeric" maxlength="10" placeholder="DD/MM/YYYY" pattern="^\d{1,2}[./\-]\d{1,2}[./\-]\d{2,4}$">
            <button type="button" class="date-trigger" aria-label="Open calendar">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="report-totals">Total: <strong id="reportTotal">00:00</strong></div>
    </div>

    <div class="report-chart-card">
      <svg id="reportChart" preserveAspectRatio="xMidYMid meet" aria-label="Daily hours"></svg>
      <div id="reportChartTip" class="chart-tip" hidden></div>
    </div>

    <div class="report-split">
      <table class="report-table">
        <thead>
          <tr>
            <th>Project</th>
            <th class="num">Duration</th>
            <th class="num">Share</th>
          </tr>
        </thead>
        <tbody id="reportProjectBody"></tbody>
      </table>
      <div class="report-donut-card">
        <svg id="reportDonut" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" aria-label="Project distribution"></svg>
      </div>
    </div>
  </section>
</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
